---
# Org-wide label set for materia-ops. Single source of truth.
# The Label Sync workflow applies this to every repo in the org (create/update
# to match, and prune any label not listed here). Edit here, commit to main,
# and the sync fans it out.

# Areas
- name: area/bootstrap
  color: "0e8a16"
- name: area/github
  color: "0e8a16"
- name: area/kubernetes
  color: "0e8a16"
- name: area/renovate
  color: "0e8a16"
- name: area/talos
  color: "0e8a16"
# Renovate types
- name: renovate/container
  color: "027fa0"
- name: renovate/github-action
  color: "027fa0"
- name: renovate/grafana-dashboard
  color: "027fa0"
- name: renovate/github-release
  color: "027fa0"
- name: renovate/helm
  color: "027fa0"
- name: renovate/talos
  color: "027fa0"
# Semantic types
- name: type/digest
  color: "ffec19"
- name: type/patch
  color: "ffec19"
- name: type/minor
  color: "ff9800"
- name: type/major
  color: "f6412d"
# Dependabot (the WoW addon repos use Dependabot, not Renovate) applies this
# label to its PRs; keep it in the canonical set so the sync does not prune it.
- name: dependencies
  color: "027fa0"
# General issue triage (the dev repos use these; kept org-wide so the sync
# does not strip them from repos that have real issues/PRs).
- name: bug
  color: "d73a4a"
- name: enhancement
  color: "a2eeef"
- name: documentation
  color: "0075ca"
- name: question
  color: "d876e3"
- name: duplicate
  color: "cfd3d7"
- name: invalid
  color: "e4e669"
- name: wontfix
  color: "ffffff"
- name: help wanted
  color: "008672"
- name: good first issue
  color: "7057ff"
# Uncategorized
- name: community
  color: "370fb2"
- name: hold
  color: "ee0701"
